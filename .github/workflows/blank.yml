# ═══════════════════════════════════════════════════════════════
# 🐍 Contribution Snake Generator
# Generates animated snake SVG from your GitHub contribution grid
# Output pushed to 'output' branch for use in README
# ═══════════════════════════════════════════════════════════════
name: 🐍 Generate Contribution Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: snake-animation
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v5

      - name: 🐍 Generate Snake SVGs (Light & Dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Mahdi-mortazavi
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Deploy to Output Branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🐍 Update snake animation — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:output
